services:
  - type: web
    name: gravity-service
    runtime: python
    buildCommand: pip install -r gravity-service/requirements.txt
    startCommand: uvicorn gravity-service.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11
    healthCheckPath: /health

  - type: web
    name: ml-service
    runtime: python
    buildCommand: pip install -r ml-service/requirements.txt
    startCommand: uvicorn ml-service.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11
    healthCheckPath: /health
